<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Students Information</title>
    <style>
        /* Reset and body styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #fff7f0;
            color: #333;
        }

        /* NAVBAR */
        nav {
            background-color: #ffe0ac;
            padding: 15px 20px;
            text-align: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        nav a {
            text-decoration: none;
            color: #000;
            margin: 0 15px;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover {
            color: #ff6f91;
        }

        /* PAGE HEADER */
        h1 {
            text-align: center;
            color: #ff6f91;
            margin: 30px 0;
            font-size: 2.5em;
        }

        /* STUDENT CARDS */
        .students-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            padding: 20px;
        }

        .student-card {
            background: linear-gradient(135deg, #ffe4e1, #fff0f5);
            border-radius: 20px;
            width: 250px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .student-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 25px rgba(255,111,145,0.3);
        }

        .student-card img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 50%;
            margin-bottom: 15px;
            border: 3px solid #ff6f91;
        }

        .student-card h3 {
            margin-bottom: 5px;
            color: #ff6f91;
        }

        .student-card p {
            margin-bottom: 10px;
            color: #555;
            font-size: 0.95em;
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 15px 0;
            background-color: #ffe0ac;
            color: #333;
            margin-top: 40px;
            font-size: 14px;
            border-top: 1px solid #ffb6b9;
        }

    </style>
</head>
