<!DOCTYPE html>
<html lang="en">
<head>
    <title>Homemade Delights - Contact</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #fff7f0;
        }

        /* NAVBAR */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: #ffe0ac;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 0;
            z-index: 100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .nav-brand .logo {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 50%;
        }

        .nav-brand .brand-name {
            font-size: 1.5em;
            color: #ff6f91;
        }

        .nav-links {
            display: flex;
            gap: 15px;
        }

        .nav-links a {
            text-decoration: none;
            color: #000;
            padding: 5px 12px;
            border-radius: 5px;
            transition: 0.3s;
            font-size: 16px;
        }

        .nav-links a:hover {
            background-color: #ffb6b9;
            color: white;
        }

        /* REMOVE PINK HIGHLIGHT WHEN ACTIVE */
        .nav-links a.active {
            background-color: transparent;
            color: #000;
            font-weight: bold;
        }

        header {
            text-align: center;
            padding: 120px 20px 50px;
            color: #333;
            margin-top: 130px;
        }

        header h1 {
            font-size: 3em;
            color: #ff6f91;
        }

        /* CONTACT INFO */
        .contact-section {
            max-width: 900px;
            margin: 40px auto;
            background: linear-gradient(135deg, #ffe4e1, #fff0f5);
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .contact-section h2 {
            text-align: center;
            color: #ff6f91;
            margin-bottom: 20px;
        }

        .contact-section p {
            font-size: 1.1em;
            color: #333;
            margin: 8px 0;
            text-align: center;
        }

        /* MAP */
        .map-container {
            margin: 30px auto;
            max-width: 900px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .map-container iframe {
            width: 100%;
            height: 400px;
            border: 0;
        }

        /* MESSAGE FORM */
        .message-form {
            max-width: 700px;
            margin: 40px auto;
            background: linear-gradient(135deg, #ffe4e1, #fff0f5);
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .message-form h2 {
            text-align: center;
            color: #ff6f91;
            margin-bottom: 20px;
        }

        .message-form label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        .message-form input, 
        .message-form textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 1em;
        }

        .message-form button {
            background-color: #ff6f91;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1em;
            transition: 0.3s;
        }

        .message-form button:hover {
            background-color: #ff4c70;
        }

        footer {
            text-align: center;
            padding: 15px 0;
            background-color: #ffe0ac;
            color: #333;
            margin-top: 40px;
            font-size: 14px;
            border-top: 1px solid #ffb6b9;
        }

    </style>
</head>
<body>

<!-- NAVBAR -->
<nav>
    <div class="nav-brand">
        <img src="logo.jpg" alt="Logo" class="logo">
        <span class="brand-name">Homemade Delights</span>
    </div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="nutri.html">Facts</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="active">Contact</a>
    </div>
</nav>

<!-- HEADER -->
<header>
    <h1>Contact Us</h1>
</header>

<!-- CONTACT INFO -->
<div class="contact-section">
    <h2>Get in Touch</h2>
    <p><strong>Address:</strong> Baao, Camarines Sur, Philippines</p>
    <p><strong>Delivery Area:</strong> Up to Naga City</p>
    <p><strong>Phone:</strong> +63912345678</p>
    <p><strong>Email:</strong> @homemadedelights.com</p>
</div>

<!-- MAP -->
<div class="map-container">
    <iframe 
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3865.123456!2d123.177!3d13.599!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x33a0011bcd12345%3A0x123456789abcdef!2sBaao%2C%20Camarines%20Sur!5e0!3m2!1sen!2sph!4v1698328512345!5m2!1sen!2sph" 
        allowfullscreen="" loading="lazy">
    </iframe>
</div>

<!-- MESSAGE FORM -->
<div class="message-form">
    <h2>Send Us a Message</h2>
    <form action="mailto:info@homemadedelights.com" method="post" enctype="text/plain">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your full name" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Your email" required>

        <label for="message">Message / Order Details</label>
        <textarea id="message" name="message" placeholder="Write your message or order here..." rows="6" required></textarea>

        <button type="submit">Send Message</button>
    </form>
</div>

<!-- FOOTER -->
<footer>
    <p>© Homemade Delights 2026.</p>
</footer>

</body>
</html>
